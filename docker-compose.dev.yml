services:
  portfolio:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: portfolio-dev
    ports:
      - "80:80"
    volumes:
      - .:/app
      - node_modules:/app/node_modules
    environment:
      - TZ=UTC
      - NODE_ENV=development
    command: npm start
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  node_modules:
